modules:
  - type: dnf
    repos:
      nonfree: rpmfusion

  - type: dnf
    install:
      packages:
        - xwayland-satellite
        - polkit
        - polkit-gnome
        - greetd
        - NetworkManager
        - NetworkManager-wifi
        - iwd
        - power-profiles-daemon
        - upower
        - xdg-desktop-portal
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-wlr
        - xdg-desktop-portal-xapp
        - bash-completion
        - curl
        - wget
        - git
        - unzip
        - p7zip
        - p7zip-plugins
        - fuse
        - fuse-libs
        - gnome-keyring
        - libsecret

  - type: dnf
    install:
      packages:
        - pipewire
        - pipewire-alsa
        - pipewire-jack-audio-connection-kit
        - pipewire-pulseaudio
        - wireplumber
        - pavucontrol

  - type: dnf
    install:
      packages:
        - bluez
        - bluez-tools
        - blueman

  # ── Shell: Bash + Starship prompt ─────────────────────────────────────────
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - starship

  - type: fonts
    fonts:
      nerd-fonts:
        - MapleMono
      google-fonts:
        - Inter

  # ── Systemd services: enable at image build time ──────────────────────────
  - type: systemd
    system:
      enabled:
        - NetworkManager.service
        - bluetooth.service
        - power-profiles-daemon.service
        - greetd.service
      disabled:
        - gdm.service
        - sddm.service
        - lightdm.service

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion

  - type: dnf
    install:
      packages:
        - adw-gtk3-theme
        - xwayland-satellite
        - greetd
        - iwd
        - power-profiles-daemon
        - xdg-desktop-portal-wlr
        - xdg-desktop-portal-xapp
        - git
        - fuse
        - fuse-libs
        - gnome-keyring
        - bootc
        - exfatprogs

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - just
        - powerstat
        - gnome-disk-utility
        - xdg-user-dirs
        - dbus-tools
        - dbus-daemon
        - qt5-qtwayland
        - qt6-qtwayland
        - vulkan-validation-layers
        - vulkan-tools
        - google-noto-emoji-fonts
        - ddcutil
        - openssl
        - alsa-firmware
        - distrobox
        - firewall-config
        - android-tools
        
  - type: dnf
    remove:
      packages:
        - firefox

  - type: dnf
    install:
      packages:
        - pipewire
        - pipewire-alsa
        - pipewire-jack-audio-connection-kit
        - pipewire-pulseaudio
        - wireplumber
        - pavucontrol

  - type: dnf
    install:
      packages:
        - bluez
        - bluez-tools
        - blueman

  # ── Shell: Bash + Starship prompt ─────────────────────────────────────────
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - starship

  - type: fonts
    fonts:
      google-fonts:
        - Inter

  # ── Systemd services: enable at image build time ──────────────────────────
  - type: systemd
    system:
      enabled:
        - NetworkManager.service
        - bluetooth.service
        - power-profiles-daemon.service
        - greetd.service

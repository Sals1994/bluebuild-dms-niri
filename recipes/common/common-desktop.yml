modules:
  - type: dnf
    install:
      packages:
        - niri

  # ── DankMaterialShell + companions (stable COPR) ──────────────────────────
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
    install:
      packages:
        - dms
        - quickshell
        - matugen
        - cliphist
        - wl-clipboard
        - dgop
        - dsearch
        - dms-greeter

  - type: dnf
    install:
      packages:
        - alacritty
        - nautilus
        - file-roller
        - gvfs
        - gvfs-mtp
        - gvfs-smb
        - gvfs-archive
        - gvfs-fuse
        - gvfs-client
        - gvfs-goa
        - gvfs-nfs
        - gvfs-gphoto2
        - blueman-nautilus
        - file-roller-nautilus
        - papers-nautilus
        - papers
        - flatpak
        - flatpak-xdg-utils

  # ── Flatpak: Flathub setup + base apps ───────────────────────────────────
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.gnome.TextEditor
          - io.github.flattool.Warehouse
          - com.github.tchx84.Flatseal
          - io.github.kolunmi.Bazaar


modules:
  # ── NVIDIA open kernel module (Turing / RTX 2000+ GPUs) ───────────────────
  # Pre-built RPMs from UBlue's akmods container; negativo17 provides userspace
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/akmods-nvidia-open:main-44 /rpms/ /tmp/rpms
      - RUN dnf install -y /tmp/rpms/ublue-os/ublue-os-nvidia*.rpm
      - RUN sed -i '0,/enabled=0/{s/enabled=0/enabled=1\npriority=90/}' /etc/yum.repos.d/negativo17-fedora-nvidia.repo
      - RUN dnf install -y /tmp/rpms/kmods/kmod-nvidia*.rpm libnvidia-fbc libva-nvidia-driver nvidia-driver nvidia-modprobe nvidia-persistenced nvidia-settings

  # Configure early KMS loading and modeset for Wayland (niri)
  - type: script
    scripts:
      - setearlyloading.sh
      - setdrmvariables.sh
